<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesabın Onaylandı | Vorx</title>
    <style>
        :root {
            --bg: #f3f1fe;
            --card: #ffffff;
            --text: #1c1c1e;
            --sub: #636366;
            --accent: #000000;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card: #1c1c1e;
                --text: #f2f2f7;
                --sub: #8e8e93;
                --accent: #ffffff;
            }
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .card {
            background-color: var(--card);
            padding: 48px 32px;
            border-radius: 32px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: block;
        }

        h1 {
            color: var(--text);
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 12px 0;
        }

        p {
            color: var(--sub);
            font-size: 16px;
            line-height: 1.5;
            margin: 0 0 32px 0;
        }

        .btn {
            display: inline-block;
            background-color: var(--accent);
            color: var(--card) !important;
            padding: 16px 40px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s ease;
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="card">
        <picture>
  <source srcset="https://fonts.gstatic.com/s/e/notoemoji/latest/1f33c/512.webp" type="image/webp">
  <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f33c/512.gif" alt="🌼" width="100" height="100">
</picture>
<br>,<br>
        <h1>Hesabın Onaylandı!</h1>
        <p>Vorx dünyasına hoş geldin. Artık uygulamaya dönüp giriş yapabilirsin.</p>
        
        <!-- Deep Link: Kullanıcıyı uygulamaya geri gönderir -->
         <br>
        <a href="vorx://login" class="btn">Uygulamayı Aç</a>
        <br>
    </div>

</body>
</html>
