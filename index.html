<!DOCTYPE html>
<html lang="tr">

<head>
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png">

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon/favicon-32x32.png">

    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon/favicon-16x16.png">

    <link rel="shortcut icon" href="./assets/favicon/favicon.ico">

    <link rel="manifest" href="./assets/favicon/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vorx</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }
        
         :root {
            --bg: #ffffff;
            --card: #f5f5f7;
            --text: #1c1c1e;
            --sub: #6e6e73;
            --accent: #000000;
            --blue: #0088FF;
            --blueLight: #e8f4ff;
            --logoColor: #0088FF;
        }
        
        @media(prefers-color-scheme:dark) {
             :root {
                --bg: #111111;
                --card: #111113;
                --text: #f2f2f7;
                --sub: #98989f;
                --accent: #ffffff;
                --blueLight: #001a33;
                --logoColor: #0088FF;
            }
        }
        
        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        
        nav {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(20px, 5vw, 60px);
            height: 58px;
            background: color-mix(in srgb, var(--bg) 45%, transparent);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid color-mix(in srgb, var(--sub) 14%, transparent);
        }
        
        .nav-logo {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--accent)
        }
        
        .nav-badge {
            font-size: .68rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--blue);
            background: var(--blueLight);
            padding: 4px 10px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: clamp(60px, 10vh, 110px) clamp(20px, 6vw, 80px) clamp(48px, 8vh, 80px);
            position: relative;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 70% 50% at 50% 30%, color-mix(in srgb, var(--blue) 10%, transparent), transparent 70%);
            pointer-events: none;
        }
        
        .vorx-logo {
            height: 9em;
            margin-bottom: 32px;
            position: relative;
            color: #000;
        }
        
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: .74rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 24px;
            position: relative;
        }
        
        .eyebrow::before,
        .eyebrow::after {
            content: '';
            width: 28px;
            height: 1px;
            background: var(--blue);
            opacity: .5
        }
        
        .hero-title {
            font-size: clamp(3.2rem, 11vw, 7.5rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
            color: var(--accent);
            margin-bottom: 18px;
            position: relative;
        }
        
        .hero-title span {
            color: var(--blue)
        }
        
        .hero-sub {
            font-size: clamp(.95rem, 2.2vw, 1.15rem);
            color: var(--sub);
            max-width: 420px;
            line-height: 1.65;
            margin-bottom: 48px;
            position: relative;
        }
        
        .countdown {
            display: flex;
            gap: clamp(8px, 2.5vw, 22px);
            margin-bottom: 52px;
            position: relative
        }
        
        .cd-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px
        }
        
        .cd-val {
            font-size: clamp(1.7rem, 4.5vw, 2.8rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--accent);
            background: var(--card);
            border: 1px solid color-mix(in srgb, var(--sub) 16%, transparent);
            border-radius: 12px;
            min-width: clamp(58px, 9vw, 84px);
            height: clamp(58px, 9vw, 84px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-variant-numeric: tabular-nums;
        }
        
        .cd-lbl {
            font-size: .62rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--sub)
        }
        
        .cd-sep {
            font-size: clamp(1.5rem, 3.5vw, 2.4rem);
            font-weight: 300;
            color: var(--sub);
            align-self: center;
            margin-bottom: 20px;
            opacity: .4
        }
        
        .rocket img {
            height: 15em;
            animation: float 3s ease-in-out infinite;
            user-select: none;
            position: relative;
            margin: 10vh 0 -1% 0;
        }
        
        @keyframes float {
            0%,
            100% {
                transform: translateY(0) rotate(-45deg)
            }
            50% {
                transform: translateY(-50px) rotate(-45deg)
            }
        }
        
        .cta {
            background: var(--blue);
            padding: clamp(44px, 7vh, 72px) clamp(20px, 6vw, 80px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .cta::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='50' height='50' viewBox='0 0 50 50' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='25' cy='25' r='1.5' fill='%23ffffff' fill-opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        
        .cta>* {
            position: relative
        }
        
        .cta h2 {
            font-size: clamp(1.4rem, 3.5vw, 2rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
            margin-bottom: 10px
        }
        
        .cta p {
            font-size: clamp(.85rem, 1.8vw, .97rem);
            color: rgba(255, 255, 255, .73);
            max-width: 390px;
            line-height: 1.65;
            margin-bottom: 28px
        }
        
        .email-form {
            display: flex;
            width: 100%;
            max-width: 440px;
            background: rgba(0, 0, 0, .18);
            border: 1px solid rgba(255, 255, 255, .14);
            border-radius: 13px;
            overflow: hidden;
            transition: border-color .2s, box-shadow .2s;
        }
        
        .email-form input {
            flex: 1;
            padding: 13px 16px;
            border: none;
            outline: none;
            font-size: .92rem;
            background: transparent;
            color: #fff;
            font-family: inherit;
            min-width: 0;
        }
        
        .email-form input::placeholder {
            color: rgba(255, 255, 255, .5)
        }
        
        .email-form button {
            padding: 13px 20px;
            border: none;
            background: rgba(255, 255, 255, .18);
            color: #fff;
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            transition: background .2s;
            border-left: 1px solid rgba(255, 255, 255, .14);
        }
        
        .email-form button:hover {
            background: rgba(255, 255, 255, .28)
        }
        
        .cta-note {
            margin-top: 14px;
            font-size: .73rem;
            color: rgba(255, 255, 255, .48)
        }
        
        .footer-bar {
            padding: 16px clamp(20px, 5vw, 60px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid color-mix(in srgb, var(--sub) 13%, transparent);
        }
        
        .footer-bar span {
            font-size: .75rem;
            color: var(--sub)
        }
        
        @media(max-width:440px) {
            .cd-sep {
                display: none
            }
            .email-form {
                flex-direction: column
            }
            .email-form button {
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, .14);
                padding: 13px
            }
            .footer-bar {
                justify-content: center;
                text-align: center
            }
        }
        
        .dust {
            z-index: -1;
            position: relative;
            height: 200px;
            width: 150%;
            margin: -40% -25%;
            pointer-events: none;
        }
        
        .dust .order-1 {
            animation: dust1 1s ease-in-out infinite;
            position: absolute;
            bottom: -50%;
            left: 75%;
            height: 200px;
            width: 100%;
            transform: translateX(-50%);
            z-index: 999;
            scale: 1.4;
        }
        
        .dust .order-1a {
            animation: dust1a 1s ease-in-out infinite;
            animation-delay: 0.2s;
            position: absolute;
            bottom: -50%;
            left: 75%;
            height: 200px;
            width: 100%;
            transform: translateX(-50%);
            z-index: 999;
            scale: 1.4;
        }
        
        .dust .order-2 {
            animation: dust2 1.2s ease-in-out infinite;
            position: absolute;
            bottom: -40%;
            left: 75%;
            height: 200px;
            width: 300px;
            transform: translateX(-50%);
            scale: 1.4;
            z-index: 998;
        }
        
        .dust .order-3 {
            animation: dust3 1s ease-in-out infinite;
            position: absolute;
            bottom: -10%;
            transform: translateX(-50%);
            scale: 1.4;
            z-index: 997;
        }
        
        .dust .order-4 {
            animation: dust4 1s ease-in-out infinite;
            position: absolute;
            bottom: 0;
            left: 75%;
            transform: translateX(-50%);
            z-index: 996;
        }
        
        @keyframes dust1 {
            0%,
            100% {
                transform: translateX(-50%) translateY(0)
            }
            50% {
                transform: translateX(-50%) translateY(-5px)
            }
        }
        
        @keyframes dust1a {
            0%,
            100% {
                transform: translateX(-50%) translateY(0)
            }
            50% {
                transform: translateX(-50%) translateY(-5px)
            }
        }
        
        @keyframes dust2 {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-5px);
            }
        }
        
        @keyframes dust3 {
            0%,
            100% {
                transform: translateX(-50%) translateY(0) scale(1.4);
            }
            50% {
                transform: translateX(-50%) translateY(-5px) scale(1.42);
            }
        }
    </style>
</head>

<div class="eyebrow">Yakınlarınız ile eğlenceli token kartlar oluşturun</div>
    <h1 class="hero-title">Vorx</h1>
    <p class="hero-sub">Harika bir şeylerin üzerinde çalışıyoruz. Yayınlanmasına kalan süre:</p>
</svg>

        <div class="countdown">
            <div class="cd-block">
                <div class="cd-val" id="d">00</div>
                <div class="cd-lbl">Gün</div>
            </div>
            <div class="cd-sep">:</div>
            <div class="cd-block">
                <div class="cd-val" id="h">00</div>
                <div class="cd-lbl">Saat</div>
            </div>
            <div class="cd-sep">:</div>
            <div class="cd-block">
                <div class="cd-val" id="m">00</div>
                <div class="cd-lbl">Dakika</div>
            </div>
            <div class="cd-sep">:</div>
            <div class="cd-block">
                <div class="cd-val" id="s">00</div>
                <div class="cd-lbl">Saniye</div>
            </div>
        </div>
        <picture class="rocket">
            <source srcset="https://fonts.gstatic.com/s/e/notoemoji/latest/1f680/512.webp" type="image/webp">
            <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f680/512.gif" alt="🚀" ">
            </picture>
            <!-- dusts -->

        </div>
    </main>

    <form id="newsletter-form " class="cta ">
        <h2>İlk siz öğrenin</h2>
        <p>Gelişmelerden haberdar olmak için e-posta adresinizi bırakın.</p>
        <span id="message "></span>
        <br>
        <div class="email-form ">
            <input type="email " id="email " placeholder="E-posta adresiniz " required>
            <button type="submit ">Bildir</button>
        </div>
    </form>

    <script>
        // Sayaç kodları
        const launch = new Date('2026-05-30T12:00:00Z');
        const p = n => String(n).padStart(2, '0');

        function tick() {
            const diff = launch - Date.now();
            if (diff <= 0) return;
            document.getElementById('d').textContent = p(Math.floor(diff / 86400000));
            document.getElementById('h').textContent = p(Math.floor((diff % 86400000) / 3600000));
            document.getElementById('m').textContent = p(Math.floor((diff % 3600000) / 60000));
            document.getElementById('s').textContent = p(Math.floor((diff % 60000) / 1000));
        }
        setInterval(tick, 1000);
        tick();

        // Form Gönderme
        const form = document.getElementById("newsletter-form ");
        form.addEventListener("submit ", async(e) => {
            e.preventDefault();
            const email = document.getElementById("email ").value;
            const messageEl = document.getElementById("message ");

            try {

                const res = await fetch("https://vorx-app-site-1.onrender.com/api/subscribe ", {
                    method: "POST ",
                    headers: {
                        "Content-Type ": "application/json "
                    },
                    body: JSON.stringify({
                        email
                    }),
                });
                const data = await res.json();
                messageEl.innerText = data.message;
                setTimeout(() => {
                    email.value = " ";
                }, 100);
            } catch (err) {
                messageEl.innerText = "Hata oluştu. ";
            }
        });
    </script>
